events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_max_body_size 0;

    # Define your internal docker services here
    upstream frontend {
      #server react-frontend:3000; # Matches docker-compose service name
        server host.docker.internal:5173;
    }

    upstream backend {
        server host.docker.internal:8080; # Matches docker-compose service name
    }

    upstream minio {
        server minio:9000; # Matches docker-compose service name
    }

    server {
        listen 80;
        server_name localhost;

        # 1. Route for the React Frontend (Default)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # WebSockets support (for React Hot Reloading)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 2. Route for the Go Backend API
        # Any URL starting with /api goes to Go

        location /api/ {

            proxy_pass http://backend;

            # -----------------------------------------------------------
            # 2. STANDARD PROXY HEADERS
            # -----------------------------------------------------------
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # -----------------------------------------------------------
            # 3. WEBSOCKET SUPPORT
            # -----------------------------------------------------------
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";


        }

        # 3. Route for MinIO (Video Storage)
        # Any URL starting with /videos goes to MinIO buckets
        location /videos/ {
            # Proxy to MinIO
            proxy_pass http://minio/videos/;
            proxy_set_header Host $host;

            # 1. Allow the Browser to send custom MinIO headers
            # (MinIO needs x-amz-date, content-type, etc.)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, ETag, x-amz-date, x-amz-content-sha256, x-amz-security-token' always;
            add_header 'Access-Control-Expose-Headers' 'ETag' always;

            # 2. Handle the Preflight (OPTIONS) request instantly here
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, ETag, x-amz-date, x-amz-content-sha256, x-amz-security-token';
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }
    }
}
