events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Define your internal docker services here
    upstream frontend {
        server react-frontend:3000; # Matches docker-compose service name
    }

    upstream backend {
        server go-server:8080; # Matches docker-compose service name
    }

    upstream minio {
        server minio:9000; # Matches docker-compose service name
    }

    server {
        listen 80;
        server_name localhost;

        # 1. Route for the React Frontend (Default)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # WebSockets support (for React Hot Reloading)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 2. Route for the Go Backend API
        # Any URL starting with /api goes to Go
        location /api/ {
            # Rewrite strips '/api' so Go just sees '/users' instead of '/api/users'
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # 3. Route for MinIO (Video Storage)
        # Any URL starting with /videos goes to MinIO buckets
        location /videos/ {
            proxy_pass http://minio/videos/; # 'videos' is your bucket name
            proxy_set_header Host $host;
        }
    }
}
