version: '3.8'

services:
  # --- 1. THE GATEWAY (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "80:80"  # The ONLY public web port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - react-frontend
      - go-server

  # --- 2. FRONTEND (React) ---
  react-frontend:
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
    # No ports mapped (Nginx handles it)

  # --- 3. ORCHESTRATOR (Go Gin) ---
  go-server:
    build:
      context: ./rest-server
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKER=kafka:9092
      - POSTGRES_HOST=postgres
      - MINIO_ENDPOINT=minio:9000
      - REDIS_HOST=redis:6379
      - APP_ENV=production

  # --- 4. SOCIAL DATA SERVER (Spring Boot) ---
  data-server:
    build:
      context: ./spring-server  # Your Spring Boot project folder
      dockerfile: Dockerfile
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/polymedia_db
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - postgres

  # --- 5. VIDEO WORKER (C++ FFmpeg) ---
  video-encoder:
    build:
      context: ./cpp-encoder    # Your C++ project folder
      dockerfile: Dockerfile
    deploy:
      replicas: 2               # Run 2 instances locally to test parallelism
    environment:
      - KAFKA_BROKER=kafka:9092
      - MINIO_ENDPOINT=minio:9000
    # No ports needed (It pulls from Kafka)

  # --- INFRASTRUCTURE (The "Brains") ---

  # A. Database
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432" # Exposed for DBeaver
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: polymedia_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # B. Object Storage
  minio:
    image: minio/minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      # DEFINING YOUR CREDENTIALS HERE
      MINIO_ROOT_USER: "admin_user"
      MINIO_ROOT_PASSWORD: "secure_password_123"
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data

  # C. Message Broker (Kafka - INFRASTRUCTURE, NOT SPRING)
  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092" # Exposed for local debugging tools
    environment:
      # Kraft mode (No Zookeeper needed - easier for local dev)
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

  # D. Vector DB + Cache (Redis Stack)
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379" # Redis Port
      - "8001:8001" # Redis Insight UI (Visualizer)
    volumes:
      - ./redis_data:/data

  # --- 6. NOTIFICATION SERVER (Elixir Broadway) ---
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    environment:
      # Connect to Kafka (same as other services)
      - KAFKA_BROKERS=kafka:9092
      # Connect to Go Server for gRPC (User Preferences)
      - GO_GRPC_HOST=go-server:50051
      # Connect to Postgres (if needed for logs, though Go usually handles DB)
      - DATABASE_URL=ecto://postgres:password@postgres/polymedia_db
    depends_on:
      - kafka
      - go-server
    deploy:
      restart_policy:
        condition: on-failure
